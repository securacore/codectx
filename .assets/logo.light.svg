<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Light content background -->
    <radialGradient id="bgGrad" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#F4F4F6"/>
      <stop offset="55%" stop-color="#EAEAEE"/>
      <stop offset="100%" stop-color="#DDDDE3"/>
    </radialGradient>

    <!-- Outer border — same as dark -->
    <linearGradient id="outerBorderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9a9a9a"/>
      <stop offset="50%"  stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>

    <!-- Top gloss -->
    <linearGradient id="glossHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Vignette — very subtle for light bg -->
    <radialGradient id="vignette" cx="50%" cy="48%" r="58%">
      <stop offset="0%"   stop-color="#00000000"/>
      <stop offset="70%"  stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000012"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect x="69" y="69" width="374" height="374" rx="49" ry="49"/>
    </clipPath>
    <clipPath id="glossClip">
      <rect x="69" y="69" width="374" height="374" rx="49" ry="49"/>
    </clipPath>
  </defs>

  <!-- LAYER 1: Outer gray gradient border — same as dark -->
  <rect x="6" y="6" width="500" height="500" rx="112" ry="112" fill="url(#outerBorderGrad)"/>

  <!-- LAYER 2: Inner black ring — kept dark -->
  <rect x="33" y="33" width="446" height="446" rx="85" ry="85" fill="#1a1a1a"/>

  <!-- LAYER 3: Light content background -->
  <rect x="69" y="69" width="374" height="374" rx="49" ry="49" fill="url(#bgGrad)"/>

  <g clip-path="url(#iconClip)">

    <!-- Neural mesh -->
    <g stroke="#0BB89A" stroke-linecap="round" fill="none" opacity="0.13">
      <line x1="148" y1="204" x2="364" y2="204" stroke-width="2"/>
      <line x1="148" y1="316" x2="364" y2="316" stroke-width="2"/>
      <line x1="256" y1="148" x2="148" y2="316" stroke-width="2"/>
      <line x1="256" y1="148" x2="364" y2="316" stroke-width="2"/>
      <line x1="148" y1="204" x2="256" y2="372" stroke-width="2"/>
      <line x1="364" y1="204" x2="256" y2="372" stroke-width="2"/>
      <line x1="148" y1="204" x2="364" y2="316" stroke-width="2"/>
      <line x1="364" y1="204" x2="148" y2="316" stroke-width="2"/>
    </g>

    <!-- Receding back edges -->
    <line x1="256" y1="148" x2="148" y2="204" stroke="#0BB89A" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
    <line x1="256" y1="148" x2="364" y2="204" stroke="#0BB89A" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
    <line x1="256" y1="260" x2="256" y2="148" stroke="#0BB89A" stroke-width="6" stroke-linecap="round" opacity="0.25"/>

    <!-- Front edges -->
    <line x1="148" y1="204" x2="148" y2="316" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="364" y1="204" x2="364" y2="316" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="148" y1="316" x2="256" y2="372" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="364" y1="316" x2="256" y2="372" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="148" y1="204" x2="256" y2="260" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="364" y1="204" x2="256" y2="260" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="260" x2="256" y2="372" stroke="#0BB89A" stroke-width="6" stroke-linecap="round"/>

    <!-- Outer joints — hollow, light fill -->
    <circle cx="256" cy="148" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="148" cy="204" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="364" cy="204" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="148" cy="316" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="364" cy="316" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="256" cy="372" r="12" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>

    <!-- Center joint — differentiated -->
    <circle cx="256" cy="260" r="14" fill="#EAEAEE" stroke="#0BB89A" stroke-width="6"/>
    <circle cx="256" cy="260" r="6.5" fill="#0BB89A"/>

    <!-- Vignette -->
    <rect x="69" y="69" width="374" height="374" fill="url(#vignette)"/>

  </g>

  <!-- Top gloss highlight -->
  <path d="M 118 69 L 394 69 Q 443 69 443 118 L 443 150 L 69 150 L 69 118 Q 69 69 118 69 Z"
        fill="url(#glossHighlight)"
        opacity="0.6"
        clip-path="url(#glossClip)"/>

</svg>
