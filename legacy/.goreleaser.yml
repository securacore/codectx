version: 2

builds:
  - main: .
    binary: codectx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/securacore/codectx/cmds/version.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "codectx_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

