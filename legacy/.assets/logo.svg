<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Box face gradients -->
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#D8AA5C"/>
      <stop offset="35%" stop-color="#C0923E"/>
      <stop offset="100%" stop-color="#886428"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#CA9A4A"/>
      <stop offset="45%" stop-color="#A67C38"/>
      <stop offset="100%" stop-color="#785A24"/>
    </linearGradient>
    <linearGradient id="backFlapGrad" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#EDD08A"/>
      <stop offset="50%" stop-color="#DCBA70"/>
      <stop offset="100%" stop-color="#D0AA62"/>
    </linearGradient>
    <linearGradient id="frontFlapGrad" x1="0.2" y1="1" x2="0.8" y2="0">
      <stop offset="0%" stop-color="#D8B468"/>
      <stop offset="50%" stop-color="#E8C478"/>
      <stop offset="100%" stop-color="#F0D088"/>
    </linearGradient>

    <!-- Background with stronger contrast -->
    <radialGradient id="bgGrad" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#343040"/>
      <stop offset="55%" stop-color="#1A1820"/>
      <stop offset="100%" stop-color="#08080C"/>
    </radialGradient>

    <!-- Vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="70%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000050"/>
    </radialGradient>

    <!-- Ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="52%" r="30%">
      <stop offset="0%" stop-color="#D4A55830"/>
      <stop offset="50%" stop-color="#D4A55812"/>
      <stop offset="100%" stop-color="#D4A55800"/>
    </radialGradient>

    <!-- Border -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#858A95"/>
      <stop offset="12%" stop-color="#50535B"/>
      <stop offset="50%" stop-color="#383B43"/>
      <stop offset="88%" stop-color="#50535B"/>
      <stop offset="100%" stop-color="#686D78"/>
    </linearGradient>

    <!-- Inner border shadow (inset) -->
    <linearGradient id="innerBorderTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000040"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>

    <!-- Light sweep across box (diagonal sheen) -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF00"/>
      <stop offset="35%" stop-color="#FFFFFF00"/>
      <stop offset="48%" stop-color="#FFFFFF0C"/>
      <stop offset="52%" stop-color="#FFFFFF0C"/>
      <stop offset="65%" stop-color="#FFFFFF00"/>
      <stop offset="100%" stop-color="#FFFFFF00"/>
    </linearGradient>

    <!-- Face top-edge highlights -->
    <linearGradient id="leftHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF22"/>
      <stop offset="25%" stop-color="#FFFFFF00"/>
    </linearGradient>
    <linearGradient id="rightHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF18"/>
      <stop offset="25%" stop-color="#FFFFFF00"/>
    </linearGradient>

    <!-- Floor shadow (ellipse under box) -->
    <radialGradient id="floorShadow" cx="50%" cy="50%" rx="50%" ry="50%">
      <stop offset="0%" stop-color="#00000040"/>
      <stop offset="70%" stop-color="#00000018"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>

    <!-- Sparkle glow -->
    <filter id="sparkleOuterGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="bigBlur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="smallBlur"/>
      <feMerge>
        <feMergeNode in="bigBlur"/>
        <feMergeNode in="smallBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-15%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000060"/>
    </filter>

    <clipPath id="iconClip">
      <rect x="14" y="14" width="484" height="484" rx="82" ry="82"/>
    </clipPath>
  </defs>

  <!-- Outer border -->
  <rect x="6" y="6" width="500" height="500" rx="88" ry="88" fill="url(#borderGrad)"/>

  <!-- Background -->
  <rect x="14" y="14" width="484" height="484" rx="82" ry="82" fill="url(#bgGrad)"/>

  <g clip-path="url(#iconClip)">
    <!-- Ambient glow -->
    <rect x="14" y="14" width="484" height="484" fill="url(#ambientGlow)"/>

    <!-- Inner border shadow (inset effect) -->
    <rect x="14" y="14" width="484" height="40" fill="url(#innerBorderTop)" opacity="0.5"/>

    <!-- Floor shadow under box -->
    <ellipse cx="256" cy="430" rx="120" ry="20" fill="url(#floorShadow)"/>

    <!-- Box -->
    <g filter="url(#shadow)">
      <!-- Left face -->
      <polygon points="117,200 256,275 256,415 117,340" fill="url(#leftGrad)" />
      <!-- Right face -->
      <polygon points="395,200 256,275 256,415 395,340" fill="url(#rightGrad)" />
      <!-- Back flap -->
      <polygon points="256,130 117,200 186,235 326,165" fill="url(#backFlapGrad)" />
      <!-- Front flap -->
      <polygon points="395,200 256,270 186,235 326,165" fill="url(#frontFlapGrad)" />
    </g>

    <!-- Face highlights (light from upper left) -->
    <polygon points="117,200 256,275 256,415 117,340" fill="url(#leftHighlight)" />
    <polygon points="395,200 256,275 256,415 395,340" fill="url(#rightHighlight)" />

    <!-- Diagonal sheen sweep across whole box -->
    <polygon points="117,200 256,275 256,415 117,340" fill="url(#sheen)" />
    <polygon points="395,200 256,275 256,415 395,340" fill="url(#sheen)" />
    <polygon points="256,130 395,200 256,270 117,200" fill="url(#sheen)" />

    <!-- Edge bevels: bright top edges -->
    <g fill="none" stroke="#FFFFFF" opacity="0.22">
      <line x1="256" y1="130" x2="117" y2="200" stroke-width="1.2" />
      <line x1="256" y1="130" x2="395" y2="200" stroke-width="1.2" />
    </g>
    <!-- Edge bevels: dark bottom/inner edges -->
    <g fill="none" stroke="#000000" opacity="0.25">
      <line x1="117" y1="200" x2="256" y2="275" stroke-width="1.8" />
      <line x1="395" y1="200" x2="256" y2="275" stroke-width="1.8" />
      <line x1="256" y1="275" x2="256" y2="415" stroke-width="2" />
      <line x1="117" y1="340" x2="256" y2="415" stroke-width="1.2" />
      <line x1="395" y1="340" x2="256" y2="415" stroke-width="1.2" />
    </g>
    <!-- Left vertical edge: subtle highlight -->
    <line x1="117" y1="200" x2="117" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.1" />

    <!-- Flap seam -->
    <line x1="326" y1="165" x2="186" y2="235" stroke="#8A6828" stroke-width="2" opacity="0.4" />

    <!-- AI Sparkle on LEFT face -->
    <g transform="translate(175,305) skewY(30) scale(0.55,0.75)">
      <!-- Wide soft glow -->
      <path d="M0,-70 C-4,-24 -24,-4 -70,0 C-24,4 -4,24 0,70 C4,24 24,4 70,0 C24,-4 4,-24 0,-70Z" fill="#FFE8A0" opacity="0.4" filter="url(#sparkleOuterGlow)" />
      <!-- Main sparkle -->
      <path d="M0,-58 C-3,-20 -20,-3 -58,0 C-20,3 -3,20 0,58 C3,20 20,3 58,0 C20,-3 3,-20 0,-58Z" fill="#FFE090" />
      <!-- Bright inner core -->
      <path d="M0,-32 C-2,-11 -11,-2 -32,0 C-11,2 -2,11 0,32 C2,11 11,2 32,0 C11,-2 2,-11 0,-32Z" fill="#FFF4D0" opacity="0.75" />
      <!-- Hot center -->
      <circle cx="0" cy="0" r="4.5" fill="#FFFCE8" opacity="0.95" />
      <!-- Companion sparkle -->
      <path d="M40,-44 C39,-32 30,-31 22,-30 C30,-29 39,-28 40,-16 C41,-28 50,-29 58,-30 C50,-31 41,-32 40,-44Z" fill="#FFE090" />
      <!-- Tiny accent -->
      <path d="M-30,-38 C-30,-34 -33,-33 -36,-32 C-33,-31 -30,-30 -30,-26 C-30,-30 -27,-31 -24,-32 C-27,-33 -30,-34 -30,-38Z" fill="#FFE090" opacity="0.7" />
    </g>

    <!-- Vignette -->
    <rect x="14" y="14" width="484" height="484" fill="url(#vignette)"/>
  </g>
</svg>
