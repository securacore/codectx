version: 2

builds:
  - main: .
    binary: codectx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/securacore/codectx/cmds/version.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "codectx_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: securacore
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/securacore/codectx"
    description: "AI Code Documentation Package Manager"
    license: "MIT"
    install: |
      bin.install "codectx"
    test: |
      system "#{bin}/codectx", "version"
